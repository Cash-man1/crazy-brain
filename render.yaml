# Blueprint Render: https://render.com/docs/infrastructure-as-code
# 1) Crea un nuovo Blueprint su Render e collega questo repo.
# 2) Dopo il primo deploy, copia l'URL del backend nel VITE_API_URL del frontend
#    (o imposta a mano nelle Environment del sito statico).
# 3) Imposta FRONTEND_URL (e opzionale CORS_EXTRA_ORIGINS) sul servizio Docker
#    all'URL pubblico del frontend (es. https://crazy-brain-web.onrender.com).

version: "1"

services:
  - type: web
    name: crazy-brain-api
    region: frankfurt
    # Playwright + Chromium: su Free puo andare stretto di RAM; in quel caso passa a Starter.
    plan: free
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      # URL del sito statico: necessario per CORS (login/Telegram dal browser).
      - key: FRONTEND_URL
        value: https://crazy-brain-web.onrender.com
      - key: CORS_EXTRA_ORIGINS
        value: https://crazy-brain-web.onrender.com
      - key: SECRET_KEY
        generateValue: true
      # Login admin via telefono (POST /api/auth/phone/login): imposta nel pannello Render.
      - key: ADMIN_PHONE_NUMBER
        sync: false
      - key: ADMIN_PHONE_PASSWORD
        sync: false
      # Opzionale: cache JSON /brain/auto-brain-public su Redis (meno memoria sul web service).
      - key: REDIS_URL
        sync: false
      # 1 = leggi prima le righe live da Redis (popolate dal worker sotto).
      - key: LIVE_ROWS_FROM_REDIS
        value: "0"
      # 0 = non avviare Playwright nel container API (serve Dockerfile.api o Evolution/Redis ok).
      - key: SCRAPER_PLAYWRIGHT_FALLBACK
        value: "1"

  # Worker leggero: solo httpx → Redis (vedi docs/RENDER_DEPLOY.md). Abilita LIVE_ROWS_FROM_REDIS=1 sull'API.
  - type: worker
    name: crazy-brain-live-worker
    region: frankfurt
    plan: free
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.worker
    dockerContext: ./backend
    envVars:
      - key: REDIS_URL
        sync: false
      - key: LIVE_WORKER_POLL_SECONDS
        value: "4"

  - type: web
    name: crazy-brain-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    # Fallback SPA (React Router): se il deploy fallisce, aggiungi la stessa regola nel pannello Render.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_INSTAGRAM_URL
        sync: false
